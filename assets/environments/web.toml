schema_version = 1
name = "web"
description = "Web development environment with Node.js 24 and loopback-only development ports"
extends = "generic"
workdir = "/workspaces"
user = "codex"
markers = ["package.json"]
allow_hosts = [
  "openai.com",
  "api.openai.com",
  "auth.openai.com",
  "chatgpt.com",
  "*.chatgpt.com",
  "*.openai.com",
  "*.oaistatic.com",
  "*.oaiusercontent.com",
  "deb.debian.org",
  "security.debian.org",
  "github.com",
  "api.github.com",
  "*.github.com",
  "raw.githubusercontent.com",
  "release-assets.githubusercontent.com",
  "registry.npmjs.org",
  "*.npmjs.org",
]

[build]
context = "../.."
dockerfile = "images/environment/Dockerfile"
target = "web"

[build.args]
NODE_IMAGE = "docker.io/library/node:24.14.1-bookworm-slim@sha256:b506e7321f176aae77317f99d67a24b272c1f09f1d10f1761f2773447d8da26c"
RUST_IMAGE = "docker.io/library/rust:1.97.0-bookworm@sha256:7d0723df719e7f213b69dc7c8c595985c3f4b060cfbee4f7bc0e347a86fe3b6a"

[[ports]]
id = "development"
container = 5173
host = 5173
host_ip = "127.0.0.1"
protocol = "tcp"

[[ports]]
id = "preview"
container = 4173
host = 4173
host_ip = "127.0.0.1"
protocol = "tcp"
