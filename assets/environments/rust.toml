schema_version = 1
name = "rust"
description = "Rust 1.97 environment with Clippy, rustfmt, rust-analyzer, LLVM, debuggers, and project caches"
extends = "generic"
workdir = "/workspaces"
user = "codex"
markers = ["Cargo.toml"]
allow_hosts = [
  "openai.com",
  "api.openai.com",
  "auth.openai.com",
  "chatgpt.com",
  "*.chatgpt.com",
  "*.openai.com",
  "*.oaistatic.com",
  "*.oaiusercontent.com",
  "deb.debian.org",
  "security.debian.org",
  "github.com",
  "api.github.com",
  "*.github.com",
  "raw.githubusercontent.com",
  "release-assets.githubusercontent.com",
  "registry.npmjs.org",
  "*.npmjs.org",
  "crates.io",
  "*.crates.io",
  "static.crates.io",
  "static.rust-lang.org",
]

[build]
context = "../.."
dockerfile = "images/environment/Dockerfile"
target = "rust"

[build.args]
NODE_IMAGE = "docker.io/library/node:24.14.1-bookworm-slim@sha256:b506e7321f176aae77317f99d67a24b272c1f09f1d10f1761f2773447d8da26c"
RUST_IMAGE = "docker.io/library/rust:1.97.0-bookworm@sha256:7d0723df719e7f213b69dc7c8c595985c3f4b060cfbee4f7bc0e347a86fe3b6a"

[env]
CARGO_HOME = "/home/codex/.cargo"
CARGO_TARGET_DIR = "/home/codex/.cache/cargo-target"
RUSTUP_HOME = "/usr/local/rustup"
PATH = "/home/codex/.cargo/bin:/home/codex/.local/bin:/usr/local/cargo/bin:/usr/local/bin:/usr/bin:/bin"

[[caches]]
id = "cargo"
target = "/home/codex/.cargo"
scope = "project"

[[caches]]
id = "cargo-target"
target = "/home/codex/.cache/cargo-target"
scope = "project"
