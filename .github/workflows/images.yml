name: Publish OCI images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  environments:
    name: Publish ${{ matrix.environment }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        environment: [generic, web, uv, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: sigstore/cosign-installer@v3.8.1
      - name: Normalize image owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >>"$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Read locked build arguments
        id: lock
        shell: bash
        run: |
          echo 'args<<LOCKED_ARGS' >>"$GITHUB_OUTPUT"
          cargo run --quiet --locked --package xtask -- build-args >>"$GITHUB_OUTPUT"
          echo 'LOCKED_ARGS' >>"$GITHUB_OUTPUT"
      - uses: docker/metadata-action@v5
        id: metadata
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/codex-start-${{ matrix.environment }}
          tags: |
            type=ref,event=tag
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: images/environment/Dockerfile
          target: ${{ matrix.environment }}
          platforms: linux/amd64,linux/arm64
          build-args: ${{ steps.lock.outputs.args }}
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=environment-${{ matrix.environment }}
          cache-to: type=gha,mode=max,scope=environment-${{ matrix.environment }}
          provenance: mode=max
          sbom: true
      - name: Sign image index
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/codex-start-${{ matrix.environment }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE@$DIGEST"
      - uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/codex-start-${{ matrix.environment }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy.sarif') != ''
        with:
          sarif_file: trivy.sarif
          category: image-${{ matrix.environment }}

  sidecar:
    name: Publish sidecar
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: sigstore/cosign-installer@v3.8.1
      - name: Normalize image owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >>"$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Read locked build arguments
        id: lock
        shell: bash
        run: |
          echo 'args<<LOCKED_ARGS' >>"$GITHUB_OUTPUT"
          cargo run --quiet --locked --package xtask -- build-args >>"$GITHUB_OUTPUT"
          echo 'LOCKED_ARGS' >>"$GITHUB_OUTPUT"
      - uses: docker/metadata-action@v5
        id: metadata
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/codex-start-sidecar
          tags: |
            type=ref,event=tag
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: images/sidecar/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: ${{ steps.lock.outputs.args }}
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=sidecar
          cache-to: type=gha,mode=max,scope=sidecar
          provenance: mode=max
          sbom: true
      - name: Sign image index
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/codex-start-sidecar
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE@$DIGEST"
      - uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/codex-start-sidecar@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy.sarif') != ''
        with:
          sarif_file: trivy.sarif
          category: image-sidecar

