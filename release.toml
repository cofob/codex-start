allow-branch = ["main"]
shared-version = true
consolidate-commits = true
tag-name = "v{{version}}"
tag-message = "codex-start {{version}}"
sign-tag = true
sign-commit = true
publish = false
push = true
pre-release-hook = [
  "cargo",
  "run",
  "--locked",
  "--package",
  "xtask",
  "--",
  "validate",
]

